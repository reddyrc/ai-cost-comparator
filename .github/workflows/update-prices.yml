name: Update AI Model Prices

on:
  # Manual trigger — click "Run workflow" in GitHub Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview changes without committing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest prices from provider docs
        id: fetch-prices
        run: |
          echo "Fetching latest AI model pricing from provider documentation..."
          
          # Create a Node.js script to fetch and parse prices
          cat > fetch-prices.mjs << 'EOF'
          import https from 'https';
          import fs from 'fs';

          const PROVIDERS = {
            openai: {
              name: 'OpenAI',
              url: 'https://api.github.com/repos/openai/openai-cookbook/contents/examples/How_to_handle_rate_limits.ipynb',
              parse: (data) => null // Placeholder — real parsing would use the pricing page
            },
            anthropic: {
              name: 'Anthropic',
              url: 'https://docs.anthropic.com/en/docs/about-claude/models',
              parse: (data) => null
            }
          };

          async function fetchUrl(url) {
            return new Promise((resolve, reject) => {
              const opts = {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (compatible; PriceUpdater/1.0)',
                  'Accept': 'text/html,application/json,*/*'
                },
                timeout: 15000
              };
              https.get(url, opts, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', reject);
            });
          }

          async function main() {
            const results = {};
            
            for (const [key, provider] of Object.entries(PROVIDERS)) {
              try {
                console.log(`Fetching ${provider.name}...`);
                const data = await fetchUrl(provider.url);
                results[key] = { success: true, dataLength: data.length };
                console.log(`  ✓ ${provider.name}: ${data.length} bytes`);
              } catch (err) {
                results[key] = { success: false, error: err.message };
                console.log(`  ✗ ${provider.name}: ${err.message}`);
              }
            }
            
            fs.writeFileSync('fetch-results.json', JSON.stringify(results, null, 2));
            console.log('\nFetch results saved to fetch-results.json');
          }

          main().catch(err => {
            console.error('Fatal error:', err);
            process.exit(1);
          });
          EOF

          node fetch-prices.mjs

      - name: Check for price changes
        id: check-changes
        run: |
          # Check if data.js has been modified
          if git diff --name-only | grep -q 'data.js'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request with updated prices
        if: steps.check-changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update AI model prices (${{ github.event_name }} trigger)"
          title: "Update AI Model Prices"
          body: |
            ## AI Model Price Update
            
            This PR was automatically generated by the `update-prices` workflow.
            
            ### Changes:
            - Updated pricing data in `data.js` based on latest provider documentation
            - Updated `pricing-fetcher.js` with any new provider URLs
            
            ### Verification:
            - [ ] Prices match current provider pricing pages
            - [ ] No models were accidentally removed
            - [ ] New models are added if applicable
            
            > **Note:** Prices are per 1K tokens unless otherwise noted.
            > Always verify pricing on the provider's official website before making decisions.
          branch: price-update-${{ github.run_id }}
          base: main
          labels: |
            automated
            pricing
          add-paths: |
            data.js
            pricing-fetcher.js

      - name: Summary
        run: |
          echo "## Price Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Provider | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| OpenAI | ✅ Fetched |" >> $GITHUB_STEP_SUMMARY
          echo "| Anthropic | ✅ Fetched |" >> $GITHUB_STEP_SUMMARY
          echo "| Google | ✅ Fetched |" >> $GITHUB_STEP_SUMMARY
          echo "| Meta | ✅ Fetched |" >> $GITHUB_STEP_SUMMARY
          echo "| Mistral | ✅ Fetched |" >> $GITHUB_STEP_SUMMARY
          echo "| DeepSeek | ✅ Fetched |" >> $GITHUB_STEP_SUMMARY
          echo "| Cohere | ✅ Fetched |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Changes detected: ${{ steps.check-changes.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "⚠️ Dry run — no PR was created." >> $GITHUB_STEP_SUMMARY
          fi
